<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildfire Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg:        #0d1117;
            --surface:   #161b22;
            --surface2:  #21262d;
            --border:    #30363d;
            --accent:    #58a6ff;
            --green:     #3fb950;
            --red:       #f85149;
            --orange:    #f78166;
            --text:      #e6edf3;
            --muted:     #8b949e;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        /* Navbar */
        .navbar {
            background-color: var(--surface) !important;
            border-bottom: 1px solid var(--border) !important;
        }
        .navbar-brand, .nav-link {
            color: var(--text) !important;
        }
        .nav-link:hover { color: var(--accent) !important; }
        .navbar-brand .fa-fire { color: var(--red); }

        /* Page wrapper */
        .page-wrap {
            max-width: 820px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
        }

        /* Section heading */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: .75rem;
        }

        /* Cards */
        .dark-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .dark-card h5 {
            color: var(--text);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        /* Form controls */
        .form-label { color: var(--muted); font-size: .9rem; }
        .form-control {
            background-color: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
        }
        .form-control:focus {
            background-color: var(--surface2);
            border-color: var(--accent);
            color: var(--text);
            box-shadow: 0 0 0 3px rgba(88,166,255,.15);
        }
        .form-control::file-selector-button {
            background-color: var(--surface2);
            color: var(--muted);
            border: none;
            border-right: 1px solid var(--border);
            padding: .375rem .75rem;
        }

        /* Buttons */
        .btn-run {
            background-color: var(--accent);
            color: #0d1117;
            border: none;
            border-radius: 6px;
            width: 100%;
            padding: .6rem;
            font-weight: 600;
            transition: opacity .15s;
        }
        .btn-run:hover { opacity: .85; color: #0d1117; }
        .btn-demo {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 6px;
            width: 100%;
            padding: .6rem;
            font-weight: 600;
            transition: background .15s;
        }
        .btn-demo:hover { background-color: rgba(88,166,255,.1); color: var(--accent); }

        /* Divider */
        hr { border-color: var(--border); margin: 1rem 0; }

        /* Placeholder */
        #placeholder {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        #placeholder .ph-icon { font-size: 2.5rem; color: var(--border); margin-bottom: .75rem; }

        /* Result images */
        .result-img {
            width: 100%;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        /* Spinner */
        .spinner-wrap {
            display: none;
            text-align: center;
            padding: 1rem;
            color: var(--muted);
        }

        /* Risk badge */
        .risk-badge {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .55rem 1.4rem;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: .06em;
            margin-bottom: 1.25rem;
        }
        .risk-LOW    { background: rgba(63,185,80,.18);  color: #3fb950; border: 1px solid #3fb950; }
        .risk-MEDIUM { background: rgba(227,179,65,.18); color: #e3b341; border: 1px solid #e3b341; }
        .risk-HIGH   { background: rgba(248,81,73,.18);  color: #f85149; border: 1px solid #f85149; }

        /* Stat cards grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: .75rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem .75rem;
            text-align: center;
        }
        .stat-card .stat-icon { font-size: 1.4rem; margin-bottom: .3rem; }
        .stat-card .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.1;
        }
        .stat-card .stat-label { font-size: .75rem; color: var(--muted); margin-top: .25rem; }
        .stat-fire   .stat-icon, .stat-fire   .stat-value { color: #f85149; }
        .stat-pixels .stat-icon, .stat-pixels .stat-value { color: #f78166; }
        .stat-cover  .stat-icon, .stat-cover  .stat-value { color: #e3b341; }
        .stat-prob   .stat-icon, .stat-prob   .stat-value { color: #58a6ff; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-fire"></i> Wildfire Detection
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/about">About</a>
            </div>
        </div>
    </nav>

    <div class="page-wrap">

        <!-- Upload card -->
        <div class="dark-card">
            <h5><i class="fas fa-satellite" style="color:var(--accent)"></i>&nbsp; Upload Satellite Data</h5>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="fileInput" class="form-label">Select .npy or .npz file &nbsp;(shape: 12×64×64)</label>
                    <input type="file" class="form-control" id="fileInput" name="file" accept=".npy,.npz" required>
                </div>
                <button type="submit" class="btn-run mb-2">
                    <i class="fas fa-brain"></i>&nbsp; Run Prediction
                </button>
            </form>
            <hr>
            <button class="btn-demo" onclick="runDemo()">
                <i class="fas fa-play"></i>&nbsp; Run Demo
            </button>
        </div>

        <!-- Spinner -->
        <div class="spinner-wrap" id="spinner">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Running model inference…</p>
        </div>

        <!-- Placeholder -->
        <div id="placeholder">
            <div class="ph-icon"><i class="fas fa-fire-flame-curved"></i></div>
            <p class="mb-0">Upload a satellite patch or click <strong>Run Demo</strong> to see results</p>
        </div>

        <!-- Results (hidden until prediction) -->
        <div id="resultsPanel" style="display:none;">

            <!-- Risk badge -->
            <div style="text-align:center;">
                <span id="riskBadge" class="risk-badge"></span>
            </div>

            <!-- Stat cards -->
            <div class="stats-grid">
                <div class="stat-card stat-fire">
                    <div class="stat-icon"><i class="fas fa-fire"></i></div>
                    <div class="stat-value" id="statFireDetected">--</div>
                    <div class="stat-label">Fire Detected</div>
                </div>
                <div class="stat-card stat-pixels">
                    <div class="stat-icon"><i class="fas fa-th"></i></div>
                    <div class="stat-value" id="statFirePixels">--</div>
                    <div class="stat-label">Fire Pixels</div>
                </div>
                <div class="stat-card stat-cover">
                    <div class="stat-icon"><i class="fas fa-percent"></i></div>
                    <div class="stat-value" id="statCoverage">--</div>
                    <div class="stat-label">Fire Coverage</div>
                </div>
                <div class="stat-card stat-prob">
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-value" id="statMaxProb">--</div>
                    <div class="stat-label">Max Probability</div>
                </div>
            </div>

            <div class="dark-card">
                <h5><i class="fas fa-chart-area" style="color:var(--orange)"></i>&nbsp; Prediction Results</h5>
                <img id="predImg" src="" class="result-img" alt="Prediction">
            </div>
            <div class="dark-card">
                <h5><i class="fas fa-layer-group" style="color:var(--green)"></i>&nbsp; Feature Grid (12 Channels)</h5>
                <img id="featureImg" src="" class="result-img" alt="Feature Grid">
            </div>
            <div id="compCard" class="dark-card" style="display:none;">
                <h5><i class="fas fa-code-compare" style="color:var(--accent)"></i>&nbsp; Ground Truth Comparison</h5>
                <img id="compImg" src="" class="result-img" alt="Comparison">
            </div>
        </div>

    </div><!-- /page-wrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showSpinner(on) {
            document.getElementById('spinner').style.display = on ? 'block' : 'none';
        }
        function showResults(data) {
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('resultsPanel').style.display = 'block';
            document.getElementById('predImg').src    = 'data:image/png;base64,' + data.prediction_image;
            document.getElementById('featureImg').src = 'data:image/png;base64,' + data.feature_image;
            if (data.comparison_image) {
                document.getElementById('compCard').style.display = 'block';
                document.getElementById('compImg').src = 'data:image/png;base64,' + data.comparison_image;
            }
            // Quantitative stats
            if (data.report) {
                var r = data.report;
                var riskIcons = {LOW: 'fa-check-circle', MEDIUM: 'fa-triangle-exclamation', HIGH: 'fa-skull-crossbones'};
                var risk = r.risk_level || 'LOW';
                var badge = document.getElementById('riskBadge');
                badge.className = 'risk-badge risk-' + risk;
                badge.innerHTML = '<i class="fas ' + (riskIcons[risk] || 'fa-info-circle') + '"></i> ' + risk + ' RISK';
                document.getElementById('statFireDetected').textContent = r.fire_detected ? 'YES' : 'NO';
                document.getElementById('statFirePixels').textContent   = r.fire_pixels !== undefined ? r.fire_pixels : '--';
                document.getElementById('statCoverage').textContent     = r.fire_percentage !== undefined ? r.fire_percentage.toFixed(2) + '%' : '--';
                document.getElementById('statMaxProb').textContent      = r.max_probability !== undefined ? (r.max_probability * 100).toFixed(1) + '%' : '--';
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var fd = new FormData();
            fd.append('file', document.getElementById('fileInput').files[0]);
            showSpinner(true);
            fetch('/predict', {method: 'POST', body: fd})
                .then(r => r.json())
                .then(data => {
                    showSpinner(false);
                    if (data.error) { alert('Error: ' + data.error); return; }
                    showResults(data);
                })
                .catch(err => { showSpinner(false); alert('Error: ' + err); });
        });

        function runDemo() {
            showSpinner(true);
            fetch('/demo', {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    showSpinner(false);
                    if (data.error) { alert('Error: ' + data.error); return; }
                    showResults(data);
                })
                .catch(err => { showSpinner(false); alert('Error: ' + err); });
        }
    </script>
</body>
</html>
